<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../responsive_base.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header-main">
        <div class="container">
            <div class="nav-top">
                <a href="../index.html" class="logo-main">
                    <img src="../Delivery/logo.png" alt="Zomato">
                </a>
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass" style="color: #696969;"></i>
                    <input type="text" placeholder="Search for restaurant, cuisine or a dish">
                </div>
                <div class="auth-btns">
                    <button onclick="openLogin()">Log in</button>
                    <button class="signup-btn" onclick="openSignup()">Sign up</button>
                </div>
            </div>

            <nav class="tabs-container">
                <a href="../DiningOut/index.html" class="tab-item">
                    <div class="tab-icon"><img src="../DiningOut/fork.avif" alt=""></div>
                    <div class="tab-text"><h2>Dining Out</h2></div>
                </a>
                <a href="../Delivery/index.html" class="tab-item active">
                    <div class="tab-icon" style="background: #E8F3F1;"><img src="../DiningOut/scooter.webp" alt=""></div>
                    <div class="tab-text"><h2>Delivery</h2></div>
                </a>
                <a href="../NightLife/index.html" class="tab-item">
                    <div class="tab-icon" style="background: #EDF4FF;"><img src="../DiningOut/Nightlife.webp" alt=""></div>
                    <div class="tab-text"><h2>Nightlife</h2></div>
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="cuisine-header">
            <h1>Burger</h1>
            <p>Satisfy your cravings with these fresh and flavoursome burgers.</p>
            <h3>91 Restaurants to explore</h3>
        </div>

        <div class="restaurant-grid">
            <!-- Card 1 -->
            <div class="restaurant-card">
                <div class="card-img-wrapper">
                    <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,w_660/RX_THUMBNAIL/IMAGES/VENDOR/2025/10/3/e531b669-397c-4a40-8f60-50868537c098_23734.JPG" alt="burger">
                    <div class="card-badge">60% OFF</div>
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <h3>Burger King</h3>
                        <div class="rating">4.1★</div>
                    </div>
                    <div class="card-details">
                        <span>Burger, Fast Food</span>
                        <span>55-60 mins</span>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="restaurant-card">
                <div class="card-img-wrapper">
                    <img src="./b1.avif" alt="burger">
                    <div class="card-badge">ITEM AT ₹79</div>
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <h3>Go Fresh</h3>
                        <div class="rating">4.1★</div>
                    </div>
                    <div class="card-details">
                        <span>Pizza, Burger</span>
                        <span>35-40 mins</span>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="restaurant-card">
                <div class="card-img-wrapper">
                    <img src="./b3.avif" alt="burger">
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <h3>The Rare Burger</h3>
                        <div class="rating">4.4★</div>
                    </div>
                    <div class="card-details">
                        <span>Burger, Beverages</span>
                        <span>20-25 mins</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="../script.js"></script>
</body>
</html>
    </div>
    
</body>
</html>
